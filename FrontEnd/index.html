<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriFitKids</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- LOGIN -->
    <div id="login" class="login-container">
        <div class="login-card">
            <h1>NutriFitKids</h1>
            <p>Acesse o sistema</p>

            <input type="text" id="usuario" placeholder="Usuário">
            <input type="password" id="senha" placeholder="Senha">

            <button onclick="fazerLogin()">Entrar</button>

            <small>Usuário: admin | Senha: 1234</small>
        </div>
    </div>

    <!-- APP -->
    <div id="app" style="display: none;">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">
                <img src="imagem/logo-nutrifitkids.png" alt="Logo NutriFitKids">
                <h2>Nutri<span>Fit</span>Kids</h2>
            </div>

            <ul>
                <li onclick="mostrarDashboard()">🏠 Dashboard</li>
                <li onclick="mostrarCadastro()">👶 Crianças</li>
                <li onclick="mostrarRelatorios()">📊 Relatórios</li>
                <li onclick="mostrarCardapio()">🍎 Cardápio</li>
                <li onclick="mostrarConfiguracoes()">⚙️ Configurações</li>
                <li onclick="sairSistema()">🚪 Sair</li>
            </ul>
        </aside>
